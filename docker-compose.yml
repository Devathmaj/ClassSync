services:
  postgres:
    image: postgres:15-alpine
    container_name: timetable-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: timetable_user
      POSTGRES_PASSWORD: timetable_password
      POSTGRES_DB: timetable_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetable_user -d timetable_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timetable-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: timetable-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://timetable_user:timetable_password@postgres:5432/timetable_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
    container_name: timetable-worker
    command: ["celery", "-A", "app.workers.generation_worker", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://timetable_user:timetable_password@postgres:5432/timetable_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: timetable-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: